function Auth({onSuccess}) {
  const [tab,setTab]=useState('login');
  const [email,setEmail]=useState('');const [pw,setPw]=useState('');
  const [co,setCo]=useState('');const [name,setName]=useState('');const [pw2,setPw2]=useState('');
  const [loading,setLoading]=useState(false);const [msg,setMsg]=useState({t:'',c:''});
  const sm=(t,c)=>setMsg({t,c});

  const login=async()=>{
    if(!email||!pw){sm('Please enter email and password.','red');return;}
    setLoading(true);
    const {data,error}=await db.auth.signInWithPassword({email,password:pw});
    setLoading(false);
    if(error){sm(error.message,'red');return;}
    onSuccess(data.user);
  };

  const register=async()=>{
    if(!co||!name||!email||!pw){sm('Please fill in all fields.','red');return;}
    if(pw!==pw2){sm('Passwords do not match.','red');return;}
    if(pw.length<8){sm('Password must be at least 8 characters.','red');return;}
    setLoading(true);
    const {data,error}=await db.auth.signUp({email,password:pw,options:{data:{company_name:co,full_name:name}}});
    setLoading(false);
    if(error){sm(error.message,'red');return;}
    if(data.user&&data.session){onSuccess(data.user);}
    else{sm('Account created! Check your email to confirm, then sign in.','green');setTab('login');}
  };

  return(
    <div className="auth-shell">
      <div className="auth-card">
        <div className="brand" style={{marginBottom:28}}><div className="brand-ico">🎭</div><div><div className="brand-name">EntertainmentOHS</div><div className="brand-sub">Live events compliance platform</div></div></div>
        <div className="auth-tabs">
          <button className={'auth-tab'+(tab==='login'?' on':'')} onClick={()=>{setTab('login');setMsg({t:'',c:''});}}>Sign in</button>
          <button className={'auth-tab'+(tab==='register'?' on':'')} onClick={()=>{setTab('register');setMsg({t:'',c:''});}}>Create account</button>
        </div>
        {tab==='login'&&<>
          <div className="fg"><label className="fl">Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@company.com" onKeyDown={e=>e.key==='Enter'&&login()}/></div>
          <div className="fg"><label className="fl">Password</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Password" onKeyDown={e=>e.key==='Enter'&&login()}/></div>
          <button className="pbtn" onClick={login} disabled={loading} style={{marginTop:6}}>{loading?'Signing in...':'Sign in'}</button>
        </>}
        {tab==='register'&&<>
          <div className="fg"><label className="fl">Company / business name</label><input type="text" value={co} onChange={e=>setCo(e.target.value)} placeholder="e.g. Showscreens"/></div>
          <div className="fg"><label className="fl">Your name</label><input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Full name"/></div>
          <div className="fg"><label className="fl">Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@company.com"/></div>
          <div className="g2" style={{marginBottom:0}}>
            <div className="fg"><label className="fl">Password</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Min. 8 characters"/></div>
            <div className="fg"><label className="fl">Confirm password</label><input type="password" value={pw2} onChange={e=>setPw2(e.target.value)} placeholder="Repeat password"/></div>
          </div>
          <button className="pbtn" onClick={register} disabled={loading} style={{marginTop:6}}>{loading?'Creating account...':'Create account'}</button>
        </>}
        {msg.t&&<div className={'info '+msg.c} style={{marginTop:14,marginBottom:0}}>{msg.t}</div>}
        <div style={{marginTop:18,textAlign:'center',fontSize:11,color:'#9b9b96'}}>Protected by row-level security &middot; Each company sees only their own data</div>
      </div>
    </div>
  );
}

  const avg=compHistory.length?Math.round(compHistory.reduce((a,r)=>a+(r.score||0),0)/compHistory.length):null;

function Analyse() {
  const {saveCompliance}=useApp();
  const [dept,setDept]=useState(null);const [docType,setDocType]=useState(null);const [state,setState]=useState('Queensland');
  const [files,setFiles]=useState([]);const [loading,setLoading]=useState(false);const [step,setStep]=useState(0);const [results,setResults]=useState(null);
  const MSGS=['Parsing document...','Loading WA Events Guidelines 2022...','Mapping department requirements...','Checking legislation...','Evaluating controls...','Compiling findings...'];
  const STATES=['Queensland','New South Wales','Victoria','Western Australia','South Australia','Tasmania','ACT','Northern Territory'];
  const DOCS=['SWMS','JHA/JSA','Risk Assessment','SOP','Emergency Plan'];
  const dd=DEPTS.find(d=>d.id===dept);

  const run=async()=>{
    if(!dept||!docType||!files.length)return;
    setLoading(true);setResults(null);let s=0;
    const t=setInterval(()=>{s=Math.min(s+1,MSGS.length-1);setStep(s);},700);
    await new Promise(r=>setTimeout(r,4500));clearInterval(t);
    const data=FINDINGS[dept]||FINDINGS.lighting;
    const cr=data.filter(f=>f.t==='critical').length;const wa=data.filter(f=>f.t==='warning').length;const pa=data.filter(f=>f.t==='pass').length;
    const score=Math.round(pa/data.length*100);
    setResults({dept,docType,state,score,cr,wa,pa,findings:data});setLoading(false);
    await saveCompliance({department:dd?.name,doc_type:docType,jurisdiction:state,score,critical_count:cr,warning_count:wa,pass_count:pa,findings:data});
  };

  return(
    <div>
      <div className="card">
        <div className="ctitle">Department</div>
        <div className="dg">{DEPTS.map(d=><button key={d.id} className={'db'+(dept===d.id?' on':'')} onClick={()=>setDept(d.id)}><span className="di">{d.icon}</span><span className="dn">{d.name}</span><span className="ds">{d.sub}</span></button>)}</div>
        {dept&&dd&&<div style={{marginTop:10,padding:'12px 16px',background:'#f8f7f5',borderRadius:8,borderLeft:'3px solid #EF9F27'}}>
          <div style={{fontSize:12,fontWeight:600,marginBottom:6}}>{dd.name} -- AI analysis context</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:6}}>{dd.tags.map(t=><span key={t} style={{fontSize:10,padding:'2px 8px',borderRadius:10,background:'#fff',border:'1px solid rgba(0,0,0,.1)',color:'#6b6b67'}}>{t}</span>)}</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:4}}>{dd.refs.map(r=><span key={r} style={{fontSize:10,padding:'2px 8px',borderRadius:10,background:'#E6F1FB',border:'1px solid #378ADD',color:'#185FA5'}}>{r}</span>)}</div>
        </div>}
      </div>
      <div className="g2">
        <div className="card"><div className="ctitle">Document type</div><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(90px,1fr))',gap:6}}>{DOCS.map(d=><button key={d} onClick={()=>setDocType(d)} style={{padding:'7px 10px',border:`${docType===d?'2px solid #378ADD':'1px solid rgba(0,0,0,.1)'}`,borderRadius:8,background:docType===d?'#E6F1FB':'#f8f7f5',cursor:'pointer',fontSize:12,fontWeight:500,color:docType===d?'#185FA5':'#1a1a18',textAlign:'center'}}>{d}</button>)}</div></div>
        <div className="card"><div className="ctitle">Jurisdiction</div><select value={state} onChange={e=>setState(e.target.value)}>{STATES.map(s=><option key={s}>{s}</option>)}</select></div>
      </div>
      <div className="card">
        <div className="ctitle">Upload documents</div>
        <div style={{border:'2px dashed rgba(0,0,0,.2)',borderRadius:12,padding:'1.5rem',textAlign:'center',background:'#f8f7f5',cursor:'pointer'}} onClick={()=>document.getElementById('fi').click()}>
          <div style={{fontSize:18,marginBottom:8}}>📄</div>
          <div style={{fontSize:14,fontWeight:500,marginBottom:4}}>Drop files here or click to browse</div>
          <div style={{fontSize:12,color:'#6b6b67'}}>PDF, DOCX, DOC</div>
        </div>
        <input type="file" id="fi" style={{display:'none'}} multiple accept=".pdf,.doc,.docx" onChange={e=>setFiles(prev=>[...prev,...Array.from(e.target.files)])}/>
        {files.map((f,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 12px',background:'#fff',border:'1px solid rgba(0,0,0,.1)',borderRadius:8,marginTop:6}}><span>📄</span><span style={{flex:1,fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</span><button onClick={()=>setFiles(prev=>prev.filter((_,j)=>j!==i))} style={{background:'none',border:'none',cursor:'pointer',color:'#9b9b96',fontSize:14}}>x</button></div>)}
        {loading&&<div style={{marginTop:12}}><div className="lbar"><div className="lfill"/></div><div style={{fontSize:12,color:'#6b6b67',textAlign:'center'}}>{MSGS[step]}</div></div>}
        <button className="pbtn" style={{marginTop:12}} onClick={run} disabled={!dept||!docType||!files.length||loading}>{loading?'Analysing...':'Analyse for compliance'}</button>
      </div>
      {results&&<>
        <div className="card">
          <div className="ctitle">{DEPTS.find(d=>d.id===results.dept)?.name} dept -- {results.docType} -- {results.state}</div>
          <div className="g4">
            <div className="sc"><div className="sl">Overall score</div><div className={'sv '+(results.score>=80?'good':results.score>=55?'warn':'bad')}>{results.score}%</div></div>
            <div className="sc"><div className="sl">Critical gaps</div><div className="sv bad">{results.cr}</div></div>
            <div className="sc"><div className="sl">Warnings</div><div className="sv warn">{results.wa}</div></div>
            <div className="sc"><div className="sl">Passed</div><div className="sv good">{results.pa}</div></div>
          </div>
        </div>
        <div className="card"><div className="ctitle">Findings</div>{results.findings.map((f,i)=>(
          <div key={i} className={'finding '+f.t}>
            <div style={{display:'flex',alignItems:'flex-start',gap:6,marginBottom:4,flexWrap:'wrap'}}><span className="ftag">{f.t==='critical'?'Critical':f.t==='warning'?'Warning':'Pass'}</span><span style={{fontSize:13,fontWeight:600}}>{f.h}</span></div>
            <div style={{fontSize:12,color:'#6b6b67',lineHeight:1.6}}>{f.d}</div>
            {f.r&&<div style={{fontSize:11,color:'#9b9b96',marginTop:4,fontStyle:'italic'}}>Ref: {f.r}</div>}
          </div>
        ))}</div>
      </>}
    </div>
  );
}

            <td style={{fontSize:11,color:'#6b6b67',padding:'10px 12px',borderBottom:'1px solid rgba(0,0,0,.1)'}}>{r.juris}</td>
            <td style={{fontSize:11,color:'#6b6b67',padding:'10px 12px',borderBottom:'1px solid rgba(0,0,0,.1)'}}>{r.ver}</td>

    </div>
  );

        <div className="modal">
          <div style={{fontSize:15,fontWeight:600,marginBottom:6}}>Your document request is ready</div>
          <div style={{fontSize:12,color:'#6b6b67',marginBottom:14,lineHeight:1.6}}>Copy this prompt and paste it into Claude. A complete OHS document will be generated.</div>
          <textarea value={prompt} readOnly style={{width:'100%',height:200,padding:12,border:'1px solid rgba(0,0,0,.2)',borderRadius:8,background:'#f8f7f5',fontSize:11,fontFamily:'inherit',resize:'none',boxSizing:'border-box'}} onClick={e=>e.target.select()}/>
          <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:12,flexWrap:'wrap'}}>
            <button className="sbtn" onClick={()=>setModal(false)}>Close</button>
            <button className="sbtn blue" onClick={copy}>{copied?'Copied!':'Copy to clipboard'}</button>
            <a href="https://claude.ai" target="_blank" rel="noopener noreferrer" style={{padding:'9px 18px',borderRadius:8,border:'none',background:'#1a1a18',color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',textDecoration:'none'}}>Open Claude</a>
          </div>
        </div>
      </div>}
    </div>
  );
}

function IncReg() {
  const {incidents,saveIncident}=useApp();
  const [iType,setIType]=useState('incident');
  const [form,setForm]=useState({date:'',time:'',event:'',venue:'',dept:'',location:'',persons:'',reportedBy:'',desc:'',injury:'',immediate:'',factors:'',actions:'',severity:'minor'});
  const [submitting,setSubmitting]=useState(false);const [msg,setMsg]=useState('');
  const [showP,setShowP]=useState(false);const [pText,setPText]=useState('');const [copied,setCopied]=useState(false);
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  const DL=['Theatre','Lighting','Audio','Staging','Rigging','Site','Power','Other'];
  const isN=['serious','critical','dangerous'].includes(form.severity);
  const submit=async()=>{
    if(!form.desc.trim()){setMsg('err:Please describe what happened.');return;}
    setSubmitting(true);const {error}=await saveIncident({...form,type:iType});setSubmitting(false);
    if(error){setMsg('err:Failed to save. Please try again.');return;}
    setMsg('ok:Logged successfully');
    setForm({date:'',time:'',event:'',venue:'',dept:'',location:'',persons:'',reportedBy:'',desc:'',injury:'',immediate:'',factors:'',actions:'',severity:iType==='nearmiss'?'nearmiss':'minor'});
    setTimeout(()=>setMsg(''),3000);
  };
  const buildP=()=>{
    if(!form.desc.trim()){alert('Please fill in the description first.');return;}
    const type=iType==='nearmiss'?'Near Miss Report':'Incident Report';
    const L=['Please generate a formal '+type+' for the following:','','**Report type:** '+type,'**Severity:** '+(SEV[form.severity]||form.severity),'**Date/time:** '+(form.date||'[Not provided]')+' '+form.time,'**Event:** '+(form.event||'[Not provided]'),'**Venue:** '+(form.venue||'[Not provided]'),'**Department:** '+(form.dept||'[Not provided]'),'**Location:** '+(form.location||'[Not provided]'),'**Persons involved:** '+(form.persons||'[Not provided]'),'**Reported by:** '+(form.reportedBy||'[Not provided]'),'','**Description:**',form.desc,'','**Injury/damage:** '+(form.injury||'None recorded'),'','**Immediate actions:**',form.immediate||'[Not recorded]','','**Contributing factors:**',form.factors||'[Not recorded]','','**Corrective actions:**',form.actions||'[Not recorded]',isN?'\n**NOTE: This incident may be NOTIFIABLE to the WHS regulator.**':'','','Please generate a complete formal '+type+' with root cause analysis, corrective action table, and WHS notification obligations. Use Australian English.'].filter(Boolean);
    setPText(L.join('\n'));setShowP(true);
  };
  const copy=()=>{navigator.clipboard.writeText(pText);setCopied(true);setTimeout(()=>setCopied(false),2000);};
  const mc=msg.startsWith('ok:')?'green':msg.startsWith('err:')?'red':'';
  const mt=msg.replace(/^(ok|err):/,'');
  return(
    <div>
      <div className="g4" style={{marginBottom:12}}>
        <div className="sc"><div className="sl">Total logged</div><div className="sv">{incidents.length}</div></div>
        <div className="sc"><div className="sl">Incidents</div><div className="sv bad">{incidents.filter(i=>i.type==='incident').length}</div></div>
        <div className="sc"><div className="sl">Near misses</div><div className="sv warn">{incidents.filter(i=>i.type==='nearmiss').length}</div></div>
        <div className="sc"><div className="sl">Actions open</div><div className="sv" style={{color:'#185FA5'}}>{incidents.filter(i=>i.actions?.trim()).length}</div></div>
      </div>
      {isN&&<div className="info red"><strong>Notifiable incident detected</strong> -- Phone WHSQ: 1300 362 128 (Qld) or WorkSafe WA: 1300 307 877. Do not disturb the scene.</div>}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,alignItems:'start'}}>
        <div className="card">
          <div className="crow"><div className="ctitle">Log an incident or near miss</div>
            <div style={{display:'flex',gap:6}}>
              <button className="sbtn red" onClick={()=>{setIType('incident');sf('severity','minor');}} style={{fontWeight:iType==='incident'?700:400}}>Incident</button>
              <button className="sbtn warn" onClick={()=>{setIType('nearmiss');sf('severity','nearmiss');}} style={{fontWeight:iType==='nearmiss'?700:400}}>Near miss</button>
            </div>
          </div>
          <div style={{display:'inline-flex',alignItems:'center',gap:6,padding:'4px 12px',borderRadius:20,marginBottom:14,background:iType==='incident'?'#FCEBEB':'#FAEEDA',border:`1px solid ${iType==='incident'?'#E24B4A':'#EF9F27'}`,fontSize:12,fontWeight:600,color:iType==='incident'?'#A32D2D':'#854F0B'}}>{iType==='incident'?'Incident':'Near miss'}</div>
          <div className="g2"><div className="fg"><label className="fl">Date</label><input type="date" value={form.date} onChange={e=>sf('date',e.target.value)}/></div><div className="fg"><label className="fl">Time</label><input type="time" value={form.time} onChange={e=>sf('time',e.target.value)}/></div></div>
          <div className="g2"><div className="fg"><label className="fl">Event</label><input type="text" value={form.event} onChange={e=>sf('event',e.target.value)} placeholder="e.g. Jordan Davis"/></div><div className="fg"><label className="fl">Venue</label><input type="text" value={form.venue} onChange={e=>sf('venue',e.target.value)} placeholder="e.g. RAC Arena"/></div></div>
          <div className="g2"><div className="fg"><label className="fl">Department</label><select value={form.dept} onChange={e=>sf('dept',e.target.value)}><option value="">-- Select --</option>{DL.map(d=><option key={d}>{d}</option>)}</select></div><div className="fg"><label className="fl">Location on site</label><input type="text" value={form.location} onChange={e=>sf('location',e.target.value)} placeholder="e.g. Loading dock"/></div></div>
          <div className="g2"><div className="fg"><label className="fl">Persons involved</label><input type="text" value={form.persons} onChange={e=>sf('persons',e.target.value)} placeholder="Name(s) / role(s)"/></div><div className="fg"><label className="fl">Reported by</label><input type="text" value={form.reportedBy} onChange={e=>sf('reportedBy',e.target.value)} placeholder="Name / role"/></div></div>
          <div className="fg"><label className="fl">Description *</label><textarea value={form.desc} onChange={e=>sf('desc',e.target.value)} style={{minHeight:80}} placeholder="Describe exactly what happened..."/></div>
          <div className="g2"><div className="fg"><label className="fl">Injury / damage</label><textarea value={form.injury} onChange={e=>sf('injury',e.target.value)} style={{minHeight:52}} placeholder="Describe injury or write None"/></div><div className="fg"><label className="fl">Immediate actions</label><textarea value={form.immediate} onChange={e=>sf('immediate',e.target.value)} style={{minHeight:52}} placeholder="First aid given, area isolated..."/></div></div>
          <div className="fg"><label className="fl">Contributing factors</label><textarea value={form.factors} onChange={e=>sf('factors',e.target.value)} placeholder="e.g. Fatigue, communication failure..."/></div>
          <div className="fg"><label className="fl">Corrective actions required</label><textarea value={form.actions} onChange={e=>sf('actions',e.target.value)} placeholder="What needs to happen to prevent recurrence?"/></div>
          <div className="fg"><label className="fl">Severity</label><select value={form.severity} onChange={e=>sf('severity',e.target.value)}><option value="nearmiss">Near miss -- no injury</option><option value="minor">Minor -- first aid only</option><option value="moderate">Moderate -- medical treatment</option><option value="serious">Serious -- hospitalisation</option><option value="critical">Critical -- death or permanent disability</option><option value="dangerous">Dangerous incident</option></select></div>
          {mt&&<div className={'info '+mc} style={{marginBottom:10}}>{mt}</div>}
          <div style={{display:'flex',gap:8}}>
            <button className="pbtn" style={{flex:1,marginTop:0}} onClick={submit} disabled={submitting}>{submitting?'Saving...':'+ Log to register'}</button>
            <button className="sbtn blue" onClick={buildP} style={{whiteSpace:'nowrap'}}>AI report</button>
          </div>
        </div>
        <div className="card" style={{minHeight:400}}>
          <div className="ctitle">Incident register</div>
          <p style={{fontSize:11,color:'#9b9b96',marginBottom:14,lineHeight:1.55}}>All incidents saved to your company account and persist between sessions.</p>
          {incidents.length===0?<div style={{textAlign:'center',padding:'2rem 1rem',color:'#9b9b96'}}><div style={{fontSize:28,marginBottom:8}}>📋</div><div style={{fontSize:13}}>No incidents logged yet.</div></div>:incidents.map(inc=>(
            <div key={inc.id} className={'inc-card '+inc.type}>
              <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',marginBottom:4}}>
                <span className={'itag '+inc.type}>{inc.type==='incident'?'Incident':'Near miss'}</span>
                <span style={{fontSize:10,padding:'2px 8px',borderRadius:10,fontWeight:600,background:'#f8f7f5',color:'#6b6b67',border:'1px solid rgba(0,0,0,.1)'}}>{SEV[inc.severity]||inc.severity}</span>
                <span style={{fontSize:11,color:'#9b9b96',marginLeft:'auto'}}>{inc.date}</span>
              </div>
              <div style={{fontSize:12,fontWeight:600,marginBottom:3}}>{inc.desc?.slice(0,90)}{(inc.desc?.length||0)>90?'...':''}</div>
              <div style={{fontSize:11,color:'#6b6b67'}}>{inc.dept&&inc.dept+' . '}{inc.venue&&'📍 '+inc.venue}</div>
            </div>
          ))}
        </div>
      </div>
      {showP&&<div className="overlay" onClick={e=>e.target===e.currentTarget&&setShowP(false)}>
        <div className="modal">
          <div style={{fontSize:15,fontWeight:600,marginBottom:6}}>AI incident report ready</div>
          <div style={{fontSize:12,color:'#6b6b67',marginBottom:14,lineHeight:1.6}}>Copy this prompt and paste into Claude to generate a formal incident report.</div>
          <textarea value={pText} readOnly style={{width:'100%',height:200,padding:12,border:'1px solid rgba(0,0,0,.2)',borderRadius:8,background:'#f8f7f5',fontSize:11,fontFamily:'inherit',resize:'none',boxSizing:'border-box'}} onClick={e=>e.target.select()}/>
          <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:12,flexWrap:'wrap'}}>
            <button className="sbtn" onClick={()=>setShowP(false)}>Close</button>
            <button className="sbtn blue" onClick={copy}>{copied?'Copied!':'Copy to clipboard'}</button>
            <a href="https://claude.ai" target="_blank" rel="noopener noreferrer" style={{padding:'9px 18px',borderRadius:8,border:'none',background:'#1a1a18',color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',textDecoration:'none'}}>Open Claude</a>
          </div>
        </div>
      </div>}
    </div>
  );
}

function App() {
  const [user,setUser]=useState(null);const [userMeta,setUserMeta]=useState({});const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('dashboard');const [saveFlash,setSaveFlash]=useState(false);
  const [incidents,setIncidents]=useState([]);const [customRegs,setCustomRegs]=useState([]);const [compHistory,setCompHistory]=useState([]);
  useEffect(()=>{
    db.auth.getSession().then(({data:{session}})=>{if(session?.user)handleAuth(session.user);setLoading(false);});
    const {data:{subscription}}=db.auth.onAuthStateChange((_e,session)=>{if(session?.user&&!user)handleAuth(session.user);if(!session){setUser(null);setUserMeta({});}});
    return()=>subscription.unsubscribe();
  },[]);
  const flash=()=>{setSaveFlash(true);setTimeout(()=>setSaveFlash(false),2500);};
  const handleAuth=async(u)=>{
    setUser(u);setUserMeta(u.user_metadata||{});const uid=u.id;
    const [ir,rr,cr]=await Promise.all([
      db.from('incidents').select('*').eq('user_id',uid).order('created_at',{ascending:false}),
      db.from('regulation_sources').select('*').eq('user_id',uid).order('created_at',{ascending:true}),
      db.from('compliance_results').select('*').eq('user_id',uid).order('created_at',{ascending:false}).limit(20),
    ]);
    if(ir.data)setIncidents(ir.data.map(r=>({id:r.id,type:r.type,date:r.date,time:r.time,event:r.event,venue:r.venue,dept:r.department,location:r.location,persons:r.persons,reportedBy:r.reported_by,desc:r.description,injury:r.injury,immediate:r.immediate_actions,factors:r.contributing_factors,actions:r.corrective_actions,severity:r.severity,createdAt:r.created_at})));
    if(rr.data)setCustomRegs(rr.data);if(cr.data)setCompHistory(cr.data);
  };
  const saveIncident=async(entry)=>{
    if(!user)return{error:'Not logged in'};
    const {data,error}=await db.from('incidents').insert({user_id:user.id,company_name:userMeta.company_name||'',type:entry.type,date:entry.date,time:entry.time,event:entry.event,venue:entry.venue,department:entry.dept,location:entry.location,persons:entry.persons,reported_by:entry.reportedBy,description:entry.desc,injury:entry.injury,immediate_actions:entry.immediate,contributing_factors:entry.factors,corrective_actions:entry.actions,severity:entry.severity}).select().single();
    if(!error&&data){setIncidents(prev=>[{id:data.id,type:data.type,date:data.date,time:data.time,event:data.event,venue:data.venue,dept:data.department,location:data.location,persons:data.persons,reportedBy:data.reported_by,desc:data.description,injury:data.injury,immediate:data.immediate_actions,factors:data.contributing_factors,actions:data.corrective_actions,severity:data.severity,createdAt:data.created_at},...prev]);flash();}
    return{error};
  };
  const saveRegSource=async(source)=>{
    if(!user)return;
    const {data,error}=await db.from('regulation_sources').insert({user_id:user.id,name:source.name,jurisdiction:source.juris,version:source.ver,status:source.st,url:source.url||'',notes:source.note||''}).select().single();
    if(!error&&data){setCustomRegs(prev=>[...prev,data]);flash();}
  };
  const saveCompliance=async(result)=>{if(!user)return;await db.from('compliance_results').insert({user_id:user.id,...result});flash();};
  const signOut=async()=>{await db.auth.signOut();setUser(null);setUserMeta({});setIncidents([]);setCustomRegs([]);setCompHistory([]);setTab('dashboard');};

  if(loading)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f8f7f5'}}><div style={{textAlign:'center'}}><div style={{fontSize:32,marginBottom:12}}>🎭</div><div style={{fontSize:14,color:'#6b6b67'}}>Loading EntertainmentOHS...</div></div></div>;
  if(!user)return<Auth onSuccess={handleAuth}/>;

  const ctx={user,userMeta,incidents,customRegs,compHistory,saveFlash,saveIncident,saveRegSource,saveCompliance};
  const tabs={dashboard:<Dashboard/>,analyse:<Analyse/>,regs:<Regs/>,templates:<DocGen/>,incidents:<IncReg/>};
  const co=userMeta?.company_name||user?.email||'';const name=userMeta?.full_name||'';

  return(
    <Ctx.Provider value={ctx}>
      <div className="shell">
        <div className="topbar">
          <div className="brand"><div className="brand-ico">🎭</div><div><div className="brand-name">EntertainmentOHS</div><div className="brand-sub">Live events compliance platform</div></div></div>
          <div className="topbar-right">
            <span className="vpill">v3.2 Cloud</span>
            {co&&<span className="co-badge">{co}</span>}
            {name&&<span style={{fontSize:12,color:'#6b6b67'}}>{name}</span>}
            {saveFlash&&<span className="save-flash">Saved</span>}
            <button className="btn-out" onClick={signOut}>Sign out</button>
          </div>
        </div>
        <div className="nav">
          {[['dashboard','Dashboard'],['analyse','Compliance'],['regs','Regulations'],['templates','Documents'],['incidents','Incidents']].map(([id,label])=>(
            <button key={id} className={'nb'+(tab===id?' on':'')} onClick={()=>setTab(id)}>{label}</button>
          ))}
        </div>
        {tabs[tab]}
      </div>
    </Ctx.Provider>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
